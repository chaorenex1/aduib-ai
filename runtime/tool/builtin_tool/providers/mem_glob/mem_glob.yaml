name: mem-glob
description: Search memory file paths by filename or path semantics and return matched file paths
parameters:
  type: object
  properties:
    query:
      type: string
      description: Natural language or keyword query for file names and paths
    path:
      type: string
      description: Optional memory-relative directory scope
    glob:
      type: string
      description: Optional file glob such as **/*.md
    max_results:
      type: integer
      description: Maximum number of matched file paths to return
  required: ["query"]
configs: {}
icon: "🧭"
provider: "builtin_provider"
type: builtin
credentials: none
side_effect: false
