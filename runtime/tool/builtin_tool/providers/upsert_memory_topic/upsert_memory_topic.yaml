name: upsert_memory_topic
description: "Create or update a memory topic. If topic with same name+domain+user_id exists, updates summary/description. Returns topic info with action (created/updated/already_exists)."
parameters:
  type: object
  properties:
    user_id:
      type: string
      description: The user ID who owns this topic
    name:
      type: string
      description: "Topic name (2-8 characters recommended)"
    domain:
      type: string
      enum: ["preference", "event", "relationship", "behavior", "knowledge"]
      description: "Memory domain this topic belongs to"
    description:
      type: string
      description: Topic description
    summary:
      type: string
      description: LLM-generated topic summary
  required: ["user_id", "name", "domain"]
configs: {}
icon: "\U0001F4DD"
provider: builtin_provider
type: builtin
credentials: none
side_effect: true
