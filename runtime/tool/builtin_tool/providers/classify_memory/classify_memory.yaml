name: classify_memory
description: Classify a memory by setting its domain, scope, lifecycle, and importance. Must be called for every memory.
parameters:
  type: object
  properties:
    memory_id:
      type: string
      description: The memory ID to classify
    domain:
      type: string
      enum: ["preference", "event", "relationship", "behavior", "knowledge"]
      description: "Memory domain: preference (likes/dislikes/habits), event (things that happened), relationship (people/teams), behavior (how-to/workflows), knowledge (facts/concepts)"
    scope:
      type: string
      enum: ["personal", "work", "project", "module"]
      description: "Memory scope: personal (private), work (work-related), project (specific project), module (specific module)"
    lifecycle:
      type: string
      enum: ["transient", "short", "long", "permanent"]
      description: "Memory lifecycle: transient (forget quickly), short (days), long (months), permanent (never forget)"
    importance:
      type: string
      enum: ["low", "medium", "high", "critical"]
      description: Memory importance level
  required: ["memory_id", "domain", "scope", "lifecycle"]
configs: {}
icon: "🧠"
provider: builtin_provider
type: builtin
credentials: none
side_effect: true
