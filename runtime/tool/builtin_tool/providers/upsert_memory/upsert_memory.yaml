name: upsert_memory
description: "Create or update a memory record with RAG pipeline integration. Stores memory content as KnowledgeDocument via FileService upload and RagManager ETL. Sets MemoryRecord.kb_doc_id to link memory to its indexed content."
parameters:
  type: object
  properties:
    memory_base_id:
      type: string
      description: The MemoryBase ID to associate with
    content:
      type: string
      description: Memory summary text to store via RAG pipeline
    type:
      type: string
      enum: ["perceptual", "episodic", "semantic", "procedural"]
      description: Memory type
    domain:
      type: string
      enum: ["preference", "event", "relationship", "behavior", "knowledge"]
      description: Memory domain
    topic_id:
      type: string
      description: Topic ID to associate this memory with
    importance:
      type: number
      description: "Importance score 0.0-1.0, default 0.5"
    tags:
      type: array
      items:
        type: string
      description: "Memory tags (max 5)"
    source:
      type: string
      description: "Source of the memory (e.g., conversation, manual)"
    memory_id:
      type: string
      description: "If provided, update existing memory instead of creating new one"
  required: ["memory_base_id", "content", "type", "domain"]
configs: {}
icon: "\U0001F4BE"
provider: builtin_provider
type: builtin
credentials: none
side_effect: true
