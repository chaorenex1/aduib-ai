name: capabilityLookup
description: Look up available capabilities
parameters:
  type: object
  properties:
    query:
      type: string
      description: Search query for capabilities
    types:
      type: array
      description: Capability types to search
      items:
        type: string
        enum: ["subagent", "skill", "tool"]
    limit:
      type: integer
      description: Maximum number of results to return
      minimum: 1
      maximum: 50
    include_meta:
      type: boolean
      description: Whether to include provider-specific metadata in results
  required: []
configs: {}
icon: "🔎"
provider: "builtin_provider"
type: builtin
credentials: none
side_effect: false
