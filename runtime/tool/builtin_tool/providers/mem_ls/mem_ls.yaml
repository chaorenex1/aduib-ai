name: mem-ls
description: List committed memory directories or files under memory_pipeline
parameters:
  type: object
  properties:
    path:
      type: string
      description: Memory-relative directory path, default root
    recursive:
      type: boolean
      description: Whether to list recursively
    include_files:
      type: boolean
      description: Whether to include file entries
    include_dirs:
      type: boolean
      description: Whether to include directory entries
    max_results:
      type: integer
      description: Maximum number of entries to return
  required: []
configs: {}
icon: "🗂️"
provider: "builtin_provider"
type: builtin
credentials: none
side_effect: false
