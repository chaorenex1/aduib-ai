name: query_memory_domain
description: Query user memory domains (MemoryBase records). Supports filtering by domain, user_id, and agent_id.
parameters:
  type: object
  properties:
    user_id:
      type: string
      description: The user ID to query memory domains for
    domain:
      type: string
      enum: ["preference", "event", "relationship", "behavior", "knowledge"]
      description: "Optional domain filter: preference (likes/habits), event (activities), relationship (people/teams), behavior (workflows), knowledge (facts/concepts)"
    agent_id:
      type: string
      description: Optional agent ID filter
  required: ["user_id"]
configs: {}
icon: "🔍"
provider: builtin_provider
type: builtin
credentials: none
side_effect: false
