name: create_memory_domain
description: Create a new memory domain (MemoryBase record). Idempotent - returns existing record if domain+user_id already exists.
parameters:
  type: object
  properties:
    user_id:
      type: string
      description: The user ID who owns this memory domain
    domain:
      type: string
      enum: ["preference", "event", "relationship", "behavior", "knowledge"]
      description: "Memory domain: preference (likes/habits), event (activities), relationship (people/teams), behavior (workflows), knowledge (facts/concepts)"
    agent_id:
      type: string
      description: Optional agent ID to associate with
    project_id:
      type: string
      description: Optional project ID to associate with
    mem_kb_mapping:
      type: object
      description: Optional domain-to-knowledge-base-ID mapping
  required: ["user_id", "domain"]
configs: {}
icon: "➕"
provider: builtin_provider
type: builtin
credentials: none
side_effect: true
