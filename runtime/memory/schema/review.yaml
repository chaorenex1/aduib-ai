name: review
description: |
  Review memory - captures assessment, findings, and decisions from code review,
  design review, architecture review, security review, or similar evaluation.
directory: "users/{user_id}/memories/review"
filename_template: "{review_time}_{review_name}.md"

fields:
  - name: review_name
    type: string
    description: |
      Review name used to uniquely identify this memory.
      Example: "Schema draft review", "Retrieval architecture review".
    merge_op: immutable

  - name: review_time
    type: string
    description: |
      Absolute review time in ISO8601 or YYYY-MM-DD format.
    merge_op: immutable

  - name: content
    type: string
    description: |
      Detailed review content describing findings, reviewer conclusions,
      requested changes, and approval or rejection decisions.
    merge_op: patch
