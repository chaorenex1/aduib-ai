name: ops_incident
description: |
  Ops incident memory - captures a concrete production or runtime incident,
  including severity, symptoms, impact, timeline, and resolution.
directory: "users/{user_id}/memories/ops/incidents"
filename_template: "{incident_time}_{incident_name}.md"

fields:
  - name: incident_name
    type: string
    description: |
      Incident name used to uniquely identify this memory.
    merge_op: immutable

  - name: incident_time
    type: string
    description: |
      Absolute incident time in ISO8601 or YYYY-MM-DD format.
    merge_op: immutable

  - name: content
    type: string
    description: |
      Detailed incident content describing severity, symptoms, impact, timeline,
      root-cause status, and resolution.
    merge_op: patch
