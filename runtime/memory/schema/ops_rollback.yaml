name: ops_rollback
description: |
  Ops rollback memory - captures a concrete rollback event, including trigger,
  rollback target, environment, and final result.
directory: "users/{user_id}/memories/ops/rollbacks"
filename_template: "{rollback_time}_{rollback_name}.md"

fields:
  - name: rollback_name
    type: string
    description: |
      Rollback name used to uniquely identify this memory.
    merge_op: immutable

  - name: rollback_time
    type: string
    description: |
      Absolute rollback time in ISO8601 or YYYY-MM-DD format.
    merge_op: immutable

  - name: content
    type: string
    description: |
      Detailed rollback content describing the trigger, target, environment,
      result, and service state after rollback.
    merge_op: patch
